databaseChangeLog:
  - changeSet:
      id: 008-create-budgets
      author: crm-finanse
      changes:
        - createTable:
            tableName: budgets
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: year
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: month
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: planned_amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: actual_amount
                  type: decimal(10,2)
              - column:
                  name: category_id
                  type: bigint
        - addForeignKeyConstraint:
            baseTableName: budgets
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_budgets_category
