databaseChangeLog:
  - changeSet:
      id: 007-create-incomes
      author: crm-finanse
      changes:
        - createTable:
            tableName: incomes
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: net_amount
                  type: decimal(10,2)
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: is_recurring
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: is_estimated
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: notes
                  type: varchar(500)
              - column:
                  name: category_id
                  type: bigint
        - addForeignKeyConstraint:
            baseTableName: incomes
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_incomes_category
