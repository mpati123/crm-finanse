databaseChangeLog:
  - changeSet:
      id: 015-create-umowa-zlecenie-configs
      author: system
      changes:
        - createTable:
            tableName: umowa_zlecenie_configs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: with_zus
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: zus_employee
                  type: DECIMAL(10, 2)
              - column:
                  name: health_insurance
                  type: DECIMAL(10, 2)
              - column:
                  name: cost_rate_type
                  type: VARCHAR(20)
                  defaultValue: 'STANDARD_20'
              - column:
                  name: custom_cost_rate
                  type: DECIMAL(5, 4)
              - column:
                  name: income_tax
                  type: DECIMAL(10, 2)
              - column:
                  name: pit2_filed
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: ppk
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: ppk_rate
                  type: DECIMAL(5, 2)

  - changeSet:
      id: 015-add-umowa-zlecenie-config-to-income-sources
      author: system
      changes:
        - addColumn:
            tableName: income_sources
            columns:
              - column:
                  name: umowa_zlecenie_config_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: income_sources
            baseColumnNames: umowa_zlecenie_config_id
            referencedTableName: umowa_zlecenie_configs
            referencedColumnNames: id
            constraintName: fk_income_source_umowa_zlecenie_config
