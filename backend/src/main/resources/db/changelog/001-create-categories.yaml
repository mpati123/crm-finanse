databaseChangeLog:
  - changeSet:
      id: 001-create-categories
      author: crm-finanse
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: varchar(50)
              - column:
                  name: icon
                  type: varchar(50)
        - sql:
            sql: "ALTER TABLE categories ADD CONSTRAINT chk_categories_type CHECK (type IN ('EXPENSE', 'INCOME'))"
