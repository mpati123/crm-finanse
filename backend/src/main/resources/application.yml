spring:
  application:
    name: crm-finanse
  datasource:
    url: jdbc:postgresql://localhost:5433/crm_finanse
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8081

# CORS configuration
cors:
  allowed-origins: http://localhost:4200
